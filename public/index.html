<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello, World.</title>
    <meta name="description" content="Dark jungle themed Hello World page." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="scene" aria-hidden="true">
      <div class="moon"></div>
      <div class="mist mist-a"></div>
      <div class="mist mist-b"></div>
      <div class="tree-line tree-back"></div>
      <div class="tree-line tree-mid"></div>

      <div class="vines">
        <span class="vine vine-1"></span>
        <span class="vine vine-2"></span>
        <span class="vine vine-3"></span>
        <span class="vine vine-4"></span>
      </div>

      <div class="fern fern-left"></div>
      <div class="fern fern-right"></div>
      <div class="broadleaf broadleaf-left"></div>
      <div class="broadleaf broadleaf-right"></div>

      <div class="tree-line tree-front"></div>
      <div class="mist mist-c"></div>
      <div class="fireflies"></div>
      <div class="vignette"></div>
    </div>

    <main class="message">
      <h1>Hello, World.</h1>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
