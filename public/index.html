<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World | Jungle Landing</title>
    <meta
      name="description"
      content="A dark jungle themed Hello World placeholder page for GitHub Pages."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="jungle-bg" aria-hidden="true">
      <div class="mist mist-a"></div>
      <div class="mist mist-b"></div>
      <div class="canopy canopy-back"></div>
      <div class="canopy canopy-mid"></div>
      <div class="canopy canopy-front"></div>
      <div class="vignette"></div>
    </div>

    <main class="hero">
      <p class="eyebrow">GitHub Pages Placeholder</p>
      <h1>Hello, World.</h1>
      <p class="subtitle">
        A moonlit jungle outpost is online. This is the first landing page for this repo.
      </p>
      <a class="cta" href="https://github.com/aspain/aspain.github.io">View Repository</a>
    </main>

    <section class="status-card" aria-label="Site status">
      <h2>Deployment Status</h2>
      <p>Automated via GitHub Actions and published to GitHub Pages.</p>
      <p class="pulse">Live and growing.</p>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
