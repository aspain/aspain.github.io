<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting to aspain/spainify</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://github.com/aspain/spainify" />
  <meta http-equiv="refresh" content="0;url=https://github.com/aspain/spainify" />
</head>
<body>
  <p>Redirecting to <a href="https://github.com/aspain/spainify">aspain/spainify</a>...</p>
  <script>
    (function () {
      var target = "https://github.com/aspain/spainify";
      var suffix = window.location.search + window.location.hash;
      window.location.replace(target + suffix);
    })();
  </script>
</body>
</html>
