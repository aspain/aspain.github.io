<body class="travels-page">
  <div class="bg" aria-hidden="true"></div>
  <canvas id="sky" aria-hidden="true"></canvas>

  <div id="moon" aria-hidden="true">
    <div class="moon-face">
      <span class="track-eye moon-eye moon-eye-left"><span class="track-pupil moon-pupil"></span></span>
      <span class="track-eye moon-eye moon-eye-right"><span class="track-pupil moon-pupil"></span></span>
    </div>
  </div>

  <main class="travels-site" aria-label="Travel photo stories">
    <div class="travels-topbar">
      <div class="travels-header-stack" aria-hidden="true">
        <h1 class="travels-sign">Travels</h1>
      </div>
    </div>

    <section class="travel-shell" aria-label="Travel explorer">
      <section class="trip-stage glass" id="trip-stage" aria-live="polite">
        <div class="trip-carousel" aria-label="Trip selector">
          <div class="trip-strip">
            <button class="trip-strip-nav trip-strip-prev" id="trip-prev" type="button" aria-label="Previous trips">Previous</button>
            <div class="trip-list" id="trip-list"></div>
            <button class="trip-strip-nav trip-strip-next" id="trip-next" type="button" aria-label="Next trips">Next</button>
          </div>
        </div>

        <div class="stage-top">
          <div class="stage-heading">
            <h2 id="trip-title">Traveling through the archive</h2>
            <p class="trip-summary" id="trip-summary" hidden></p>
          </div>
        </div>

        <div class="stage-grid">
          <section class="photo-panel" aria-label="Photo gallery">
            <div class="photo-frame">
              <button class="photo-nav photo-prev" id="photo-prev" type="button" aria-label="Previous photo">Previous</button>
              <button class="hero-photo-button" id="hero-photo-button" type="button" aria-label="Open enlarged photo">
                <img id="hero-image" class="hero-image" src="" alt="" />
              </button>
              <button class="photo-nav photo-next" id="photo-next" type="button" aria-label="Next photo">Next</button>
              <span class="photo-count" id="photo-count" aria-live="polite"></span>
            </div>
            <div class="caption-card">
              <p class="caption-location" id="photo-location"></p>
            </div>
          </section>

          <aside class="map-panel" aria-label="Map view">
            <div class="map-panel-header">
              <h3 id="map-title">Current stop</h3>
            </div>
            <div class="map-card">
              <div class="map-frame" id="map-frame">
                <div class="travel-map" id="travel-map" aria-label="Map showing photo locations"></div>
                <div class="map-empty" id="map-empty" hidden>
                  <p>Map unavailable.</p>
                  <span>The gallery still works without it.</span>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </section>

    <footer class="travels-footer glass">
      <p><a href="/">Home</a> / <span>Travels</span></p>
      <p>&copy; <span id="copyright-year"></span> Adam Spain</p>
    </footer>
  </main>

  <div class="travel-lightbox" id="travel-lightbox" role="dialog" aria-modal="true" aria-label="Expanded travel photo" aria-hidden="true" tabindex="-1">
    <button class="travel-lightbox-close" id="travel-lightbox-close" type="button" aria-label="Close expanded photo">Close</button>
    <button class="travel-lightbox-nav travel-lightbox-prev" id="travel-lightbox-prev" type="button" aria-label="Previous photo">Previous</button>
    <img class="travel-lightbox-image" id="travel-lightbox-image" src="" alt="" />
    <button class="travel-lightbox-nav travel-lightbox-next" id="travel-lightbox-next" type="button" aria-label="Next photo">Next</button>
    <span class="travel-lightbox-indicator" id="travel-lightbox-indicator" aria-live="polite" hidden>
      <span class="travel-lightbox-indicator-title" id="travel-lightbox-indicator-title"></span>
      <span class="travel-lightbox-indicator-count" id="travel-lightbox-indicator-count"></span>
    </span>
  </div>

  <script src="/lightbox.js?v=20260306-1"></script>
  <script src="/script.js?v=20260306-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script src="/travels.js?v=20260306-23"></script>
</body>
</html>
