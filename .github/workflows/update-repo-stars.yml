name: Refresh Repository Stars

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh-stars:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit_snapshot.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update star snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-repo-stars.mjs

      - name: Commit and push snapshot changes
        id: commit_snapshot
        run: |
          if git diff --quiet -- public/repo-stars.json; then
            echo "No star changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/repo-stars.json
          git commit -m "chore: refresh repository stars"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        if: steps.commit_snapshot.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        if: steps.commit_snapshot.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: refresh-stars
    if: needs.refresh-stars.outputs.changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
